<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <style>
    body { 
      width: 280px; 
      font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif; 
      padding: 16px; 
      background: #0f172a; 
      color: #f8fafc; 
      margin: 0; 
    }
    .title { 
      font-size: 15px; 
      font-weight: 800; 
      margin-bottom: 12px; 
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .card {
      background: #1e293b;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
      display: none; /* 숨김 처리 후 데이터 수집 시 노출 */
    }
    .card img {
      width: 100%;
      height: 120px;
      object-fit: cover;
      border-radius: 6px;
      margin-bottom: 8px;
    }
    .p-title { font-size: 12px; font-weight: 600; line-height: 1.4; color: #cbd5e1; margin-bottom: 6px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .p-price { font-size: 16px; font-weight: 800; color: #4ade80; font-family: monospace; }
    
    button { 
      width: 100%; 
      padding: 12px; 
      background: #3b82f6; 
      color: white; 
      border: none; 
      border-radius: 8px; 
      cursor: pointer; 
      font-weight: bold; 
      font-size: 13px;
      transition: 0.2s;
    }
    button:hover { background: #2563eb; }
    
    #status { 
      font-size: 11px; 
      text-align: center; 
      color: #94a3b8; 
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="title">🚀 통합 소싱 클리퍼</div>
  
  <div id="settings-panel" style="margin-bottom:12px; background:rgba(255,255,255,0.05); padding:10px; border-radius:8px;">
    <div style="font-size:11px; margin-bottom:6px; color:#94a3b8;">T7 설정의 GAS 배포 URL (필수):</div>
    <input type="text" id="gas-url-input" placeholder="https://script.google.com/macros/s/.../exec" style="width:100%; box-sizing:border-box; padding:6px; font-size:10px; border-radius:4px; border:1px solid #475569; background:#0f172a; color:#fff; margin-bottom:6px;">
    <button id="saveUrlBtn" style="padding:6px; font-size:11px; background:#475569;">URL 저장하기</button>
  </div>
  
  <div id="product-card" class="card">
    <img id="p-img" src="" alt="상품 썸네일" />
    <div id="p-title" class="p-title">로딩 중...</div>
    <div id="p-price" class="p-price">-원</div>
  </div>

  <button id="clipBtn">🔍 이 상품 정보 스크래핑</button>
  <button id="sendBtn" style="display:none; background:#10b981; margin-top:8px;">✅ 소싱 대시보드(T1)로 전송</button>
  
  <div id="status">상품 페이지(도매매/네이버 등)를 열어주세요.</div>
  <script src="popup.js"></script>
</body>
</html>
