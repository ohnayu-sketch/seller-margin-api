<!DOCTYPE html>
<html style="margin:0; padding:0; height:100%; overflow:hidden; background-color: #0f172a;">
<head>
  <meta charset="UTF-8">
  <title>Seller Dashboard (Iframe Bridge)</title>
  <style>
    /* 스크롤바 숨김 및 심리스 렌더링 유지 */
    body { margin: 0; padding: 0; height: 100vh; overflow: hidden; background-color: #0f172a; }
    iframe { width: 100%; height: 100%; border: none; display: block; }
  </style>
</head>
<body>
  <!-- 로컬 웹서버 또는 원격 서버(GitHub Pages)에 띄워진 타겟 대시보드 강제 삽입 -->
  <!-- 주의: 파이썬 SimpleHTTPServer (http://127.0.0.1:5500)가 켜져 있어야 합니다. -->
  <iframe id="dashboard-frame" src="http://127.0.0.1:5500/seller-dashboard-v6.html" allow="clipboard-write; clipboard-read"></iframe>
  
  <!-- 백그라운드 워커와 Iframe을 안전하게 연결해주는 통신 중계기 -->
  <script src="sidepanel-bridge.js"></script>
</body>
</html>
