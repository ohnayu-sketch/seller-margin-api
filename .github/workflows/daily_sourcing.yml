name: Daily AI Sourcing Bot

on:
  schedule:
    # 매일 한국 시간 오전 6시 (UTC KST-9 => 전날 21시)
    - cron: '0 21 * * *'
  workflow_dispatch: # 수동 실행을 위한 옵션

jobs:
  run-sourcing-bot:
    runs-on: ubuntu-latest

    steps:
    - name: 저장소 체크아웃
      uses: actions/checkout@v3

    - name: 파이썬 3.10 환경 설정
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 의존성 패키지 설치
      run: |
        python -m pip install --upgrade pip
        pip install requests google-generativeai pytz

    - name: 소싱 봇 메인 로직 실행
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        APPS_SCRIPT_URL: ${{ secrets.APPS_SCRIPT_URL }}
      run: |
        cd sourcing_bot
        python main.py
