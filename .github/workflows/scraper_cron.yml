name: Auto Scraping & Data Oracle Cron

on:
  schedule:
    # 매 시간마다 실행 (1시간 주기)
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  scrape-and-evaluate:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        pip install requests pydantic beautifulsoup4

    - name: Run MCP Scraper Cron
      env:
        DATA_ORACLE_URL: ${{ secrets.DATA_ORACLE_URL }}
        GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
      run: |
        python scripts/scraper_cron.py
